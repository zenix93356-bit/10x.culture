<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>10X THRIFT — Luxury Streetwear</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --void: #080808; --concrete: #141414; --steel: #1E1E1E;
      --wire: #2C2C2C; --smoke: #6B6B6B; --ash: #A0A0A0;
      --chalk: #E8E8E8; --white: #F5F5F5;
      --volt: #C8FF00; --volt-dim: #9ABF00; --red: #FF2D2D;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--void); color: var(--chalk); font-family: "Space Grotesk", sans-serif; font-weight: 300; overflow-x: hidden; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--void); }
    ::-webkit-scrollbar-thumb { background: var(--volt); }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 48px;
      background: rgba(8,8,8,0.0);
      border-bottom: 1px solid rgba(200,255,0,0.0);
      transition: background 0.4s, border-color 0.4s;
    }
    nav.scrolled { background: rgba(8,8,8,0.96); border-color: rgba(200,255,0,0.15); backdrop-filter: blur(12px); }
    .nav-logo { font-family: "Bebas Neue", sans-serif; font-size: 26px; letter-spacing: 0.12em; color: var(--white); text-decoration: none; }
    .nav-logo span { color: var(--volt); }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { font-family: "Space Mono", monospace; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ash); text-decoration: none; transition: color 0.25s; position: relative; }
    .nav-links a::after { content: ""; position: absolute; bottom: -4px; left: 0; width: 0; height: 1px; background: var(--volt); transition: width 0.3s; }
    .nav-links a:hover { color: var(--volt); }
    .nav-links a:hover::after { width: 100%; }
    .nav-right { display: flex; align-items: center; gap: 14px; }
    .nav-right button { background: none; border: none; color: var(--ash); cursor: pointer; font-size: 15px; transition: color 0.25s; }
    .nav-right button:hover { color: var(--volt); }
    .cart-btn {
      background: var(--volt); color: var(--void);
      font-family: "Space Mono", monospace; font-size: 8px; letter-spacing: 0.18em;
      text-transform: uppercase; padding: 10px 20px; border: none; cursor: pointer; font-weight: 700;
      transition: background 0.25s;
    }
    .cart-btn:hover { background: var(--volt-dim); }

    /* HERO */
    .hero { position: relative; height: 100vh; display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; }
    .hero-bg-text {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-family: "Bebas Neue", sans-serif; font-size: clamp(160px, 22vw, 320px);
      color: rgba(200,255,0,0.04); white-space: nowrap; pointer-events: none;
      z-index: 1; letter-spacing: 0.05em; user-select: none;
    }
    .hero-left { display: flex; flex-direction: column; justify-content: flex-end; padding: 0 60px 80px; position: relative; z-index: 2; }
    .hero-tag { font-family: "Space Mono", monospace; font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--volt); margin-bottom: 20px; opacity: 0; animation: fadeUp 0.7s 0.2s ease forwards; }
    .hero-title { font-family: "Bebas Neue", sans-serif; font-size: clamp(72px, 9vw, 140px); line-height: 0.92; letter-spacing: 0.03em; color: var(--white); margin-bottom: 32px; opacity: 0; animation: fadeUp 0.7s 0.4s ease forwards; }
    .hero-title .outline { -webkit-text-stroke: 1px var(--chalk); color: transparent; }
    .hero-title .volt { color: var(--volt); }
    .hero-desc { font-size: 13px; line-height: 1.8; color: var(--smoke); max-width: 360px; margin-bottom: 44px; opacity: 0; animation: fadeUp 0.7s 0.6s ease forwards; }
    .hero-ctas { display: flex; gap: 14px; align-items: center; opacity: 0; animation: fadeUp 0.7s 0.8s ease forwards; }
    .hero-right { position: relative; overflow: hidden; }
    .hero-right img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(20%) contrast(1.05); }
    .hero-right::after { content: ""; position: absolute; inset: 0; background: linear-gradient(to right, var(--void) 0%, transparent 30%), linear-gradient(to top, var(--void) 0%, transparent 30%); }
    .drop-badge { position: absolute; top: 40px; right: 40px; z-index: 3; background: var(--volt); color: var(--void); font-family: "Bebas Neue", sans-serif; font-size: 11px; letter-spacing: 0.18em; padding: 8px 16px; clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px)); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* BUTTONS */
    .btn-volt { padding: 16px 38px; background: var(--volt); color: var(--void); font-family: "Space Mono", monospace; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 700; border: none; cursor: pointer; transition: background 0.25s, transform 0.2s; clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px)); }
    .btn-volt:hover { background: var(--volt-dim); transform: translateY(-2px); }
    .btn-outline { padding: 16px 38px; background: transparent; color: var(--chalk); font-family: "Space Mono", monospace; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 400; border: 1px solid var(--wire); cursor: pointer; transition: border-color 0.25s, color 0.25s; clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px)); }
    .btn-outline:hover { border-color: var(--volt); color: var(--volt); }

    /* TICKER */
    .ticker { background: var(--volt); padding: 12px 0; overflow: hidden; white-space: nowrap; }
    .ticker-track { display: inline-flex; animation: ticker 28s linear infinite; }
    .ticker-item { font-family: "Space Mono", monospace; font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--void); font-weight: 700; padding: 0 32px; }
    .ticker-sep { color: rgba(8,8,8,0.35); }
    @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    /* SECTION */
    .sec { padding: 100px 48px; }
    .sec-tag { font-family: "Space Mono", monospace; font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--volt); margin-bottom: 14px; }
    .sec-title { font-family: "Bebas Neue", sans-serif; font-size: clamp(44px, 5vw, 76px); line-height: 0.95; letter-spacing: 0.04em; color: var(--white); }
    .sec-title .outline { -webkit-text-stroke: 1px var(--chalk); color: transparent; }

    /* PRODUCTS */
    .products { background: var(--void); }
    .products-head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 52px; }
    .filter-row { display: flex; gap: 4px; }
    .filt { font-family: "Space Mono", monospace; font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; background: var(--steel); color: var(--smoke); border: 1px solid var(--wire); padding: 8px 18px; cursor: pointer; transition: all 0.2s; }
    .filt.active, .filt:hover { background: var(--volt); color: var(--void); border-color: var(--volt); font-weight: 700; }

    .prod-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
    .prod-card { cursor: pointer; background: var(--concrete); }
    .prod-img { position: relative; overflow: hidden; aspect-ratio: 3/4; }
    .prod-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.55s ease; }
    .prod-card:hover .prod-img img { transform: scale(1.05); }
    .prod-badge { position: absolute; top: 0; left: 0; background: var(--volt); color: var(--void); font-family: "Space Mono", monospace; font-size: 7px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 700; padding: 5px 10px; }
    .prod-quick { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(200,255,0,0.95); color: var(--void); font-family: "Space Mono", monospace; font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 700; padding: 14px; text-align: center; transform: translateY(100%); transition: transform 0.3s ease; border: none; cursor: pointer; width: 100%; }
    .prod-card:hover .prod-quick { transform: translateY(0); }
    .prod-info { padding: 18px; }
    .prod-sub { font-family: "Space Mono", monospace; font-size: 7px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--smoke); margin-bottom: 6px; }
    .prod-name { font-family: "Bebas Neue", sans-serif; font-size: 22px; letter-spacing: 0.05em; color: var(--white); margin-bottom: 10px; line-height: 1; }
    .prod-price { display: flex; align-items: center; gap: 10px; }
    .price-now { font-size: 16px; color: var(--volt); font-weight: 500; }

    /* MANIFESTO */
    .manifesto { background: var(--volt); padding: 80px 48px; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
    .manifesto-left h2 { font-family: "Bebas Neue", sans-serif; font-size: clamp(52px, 6vw, 96px); line-height: 0.9; letter-spacing: 0.03em; color: var(--void); }
    .manifesto-left h2 .outline-dark { -webkit-text-stroke: 1.5px var(--void); color: transparent; }
    .manifesto-right p { font-size: 15px; line-height: 1.9; color: rgba(8,8,8,0.7); margin-bottom: 32px; }
